# Cloud Build configuration for collections-sync
steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/collections-sync:${SHORT_SHA}'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/collections-sync:latest'
      - '-f'
      - 'collections-sync/Dockerfile'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/${PROJECT_ID}/collections-sync:${SHORT_SHA}'

# Deployment is handled by deploy.sh after this build completes. Keeping this
# file build-only avoids referencing Kubernetes manifests this repo does not
# contain.

images:
  - 'gcr.io/${PROJECT_ID}/collections-sync:${SHORT_SHA}'
  - 'gcr.io/${PROJECT_ID}/collections-sync:latest'

substitutions:
  _REGION: 'us-central1'

timeout: '3600s'
